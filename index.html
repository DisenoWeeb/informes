<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Informe BCRA</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
}

.entidad{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:left;
}

.error{
    color:red;
}

</style>

</head>
<body>

<h1>Consulta BCRA</h1>

<input
id="cuit"
placeholder="Ingrese CUIT/CUIL">

<button onclick="consultar()">
Consultar
</button>

<div id="resultado"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby29NcU3FPBzkdv3l9Cz_eNBgpmLnTNmnOtkqROAxxt4QXi3YzH77AQCXqMXY7pAba-1Q/exec";

async function consultar(){

    const cuit =
      document.getElementById("cuit").value.trim();

    const resultado =
      document.getElementById("resultado");

    resultado.innerHTML = "Consultando...";

    try{

      const response =
        await fetch(`${API}?cuit=${cuit}`);

      const json =
        await response.json();

      if(!json.ok){

        resultado.innerHTML =
          `<p class="error">${json.error}</p>`;

        return;
      }

      let html = "";

      const actual =
        json.actual.results;

      html += `
      <div class="card">
        <h2>${actual.denominacion}</h2>
        <p><strong>CUIT:</strong> ${actual.identificacion}</p>
      </div>
      `;

      actual.periodos.forEach(periodo => {

        html += `
        <div class="card">
          <h3>Periodo ${periodo.periodo}</h3>
        `;

        periodo.entidades.forEach(entidad => {

          html += `
          <div class="entidad">

            <strong>${entidad.entidad}</strong><br>

            Situación:
            ${entidad.situacion}<br>

            Monto:
            $${entidad.monto.toLocaleString("es-AR")}<br>

            Días atraso:
            ${entidad.diasAtrasoPago}

          </div>
          `;
        });

        html += `</div>`;

      });

      if(
        json.historica &&
        json.historica.results &&
        json.historica.results.length
      ){

        html += `
        <div class="card">
          <h2>Historial Crediticio</h2>
        `;

        json.historica.results.forEach(item => {

          html += `
          <table>
            <tr>
              <th>Periodo</th>
              <th>Situación</th>
              <th>Monto</th>
            </tr>

            <tr>
              <td>${item.periodo}</td>
              <td>${item.situacion}</td>
              <td>$${Number(item.monto || 0).toLocaleString("es-AR")}</td>
            </tr>
          </table>

          <br>
          `;

        });

        html += `</div>`;
      }

      resultado.innerHTML = html;

    }
    catch(err){

      resultado.innerHTML =
        `<p class="error">${err}</p>`;

    }

}

</script>

</body>
</html>
