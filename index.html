<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Informe BCRA</title>
<style>
body { font-family: Arial, sans-serif; max-width: 1200px; margin: 40px auto; padding: 20px; }
input { padding: 10px; width: 250px; }
button { padding: 10px 20px; cursor: pointer; }
.card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-top: 15px; }
.entidad { border-bottom: 1px solid #eee; padding: 10px 0; }
.error { color: red; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background: #f5f5f5; }
</style>
</head>
<body>
<h1>Consulta BCRA</h1>
<input id="cuit" placeholder="Ingrese CUIT/CUIL">
<button onclick="consultar()">Consultar</button>
<div id="resultado"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycby29NcU3FPBzkdv3l9Cz_eNBgpmLnTNmnOtkqROAxxt4QXi3YzH77AQCXqMXY7pAba-1Q/exec";

function consultar() {
    const cuit = document.getElementById("cuit").value.trim();
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "Consultando...";

    // Limpiar script anterior si existe
    const viejo = document.getElementById("script-bcra");
    if (viejo) viejo.remove();

    // Nombre de callback único para evitar conflictos
    const callbackName = "bcraCallback_" + Date.now();

    // Función que recibe la respuesta
    window[callbackName] = function(json) {
        delete window[callbackName];
        document.getElementById("script-bcra")?.remove();

        if (!json.ok) {
            resultado.innerHTML = `<p class="error">${json.error}</p>`;
            return;
        }

        const data = json.actual.results;
        const historica = json.historica.results;

        let html = "";

        // Encabezado
        html += `
        <div class="card">
            <h2>${data.denominacion}</h2>
            <p><strong>CUIT:</strong> ${data.identificacion}</p>
        </div>`;

        // Deuda actual
        html += `<div class="card"><h2>Deuda Actual</h2>`;
        if (data.periodos && data.periodos.length > 0) {
            data.periodos.forEach(periodo => {
                html += `<h3>Periodo ${periodo.periodo}</h3>`;
                periodo.entidades.forEach(entidad => {
                    html += `
                    <div class="entidad">
                        <strong>${entidad.entidad}</strong><br>
                        Situación: ${entidad.situacion}<br>
                        Monto: $${entidad.monto.toLocaleString("es-AR")}<br>
                        Días atraso: ${entidad.diasAtrasoPago}
                    </div>`;
                });
            });
        } else {
            html += `<p>Sin deudas actuales.</p>`;
        }
        html += `</div>`;

        // Historial
        html += `
        <div class="card">
            <h2>Historial (últimos 24 meses)</h2>
            <table>
                <tr>
                    <th>Periodo</th>
                    <th>Entidad</th>
                    <th>Situación</th>
                    <th>Monto</th>
                </tr>`;

        if (historica.periodos && historica.periodos.length > 0) {
            historica.periodos.forEach(periodo => {
                periodo.entidades.forEach(entidad => {
                    html += `
                    <tr>
                        <td>${periodo.periodo}</td>
                        <td>${entidad.entidad}</td>
                        <td>${entidad.situacion}</td>
                        <td>$${entidad.monto.toLocaleString("es-AR")}</td>
                    </tr>`;
                });
            });
        } else {
            html += `<tr><td colspan="4">Sin historial disponible.</td></tr>`;
        }

        html += `</table></div>`;
        resultado.innerHTML = html;
    };

    // Inyectar script con callback
    const script = document.createElement("script");
    script.id = "script-bcra";
    script.src = `${API}?cuit=${cuit}&callback=${callbackName}`;
    script.onerror = function() {
        resultado.innerHTML = `<p class="error">Error al conectar con el servidor.</p>`;
    };
    document.body.appendChild(script);
}
</script>
</body>
</html>
