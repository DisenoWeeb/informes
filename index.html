<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Informe BCRA</title>

<style>

body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
}

.entidad{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.error{
    color:red;
}

</style>

</head>
<body>

<h1>Consulta BCRA</h1>

<input
    id="cuit"
    placeholder="Ingrese CUIT/CUIL"
>

<button onclick="consultar()">
Consultar
</button>

<div id="resultado"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycby29NcU3FPBzkdv3l9Cz_eNBgpmLnTNmnOtkqROAxxt4QXi3YzH77AQCXqMXY7pAba-1Q/exec";

async function consultar(){

    const cuit =
        document.getElementById("cuit").value.trim();

    const resultado =
        document.getElementById("resultado");

    resultado.innerHTML = "Consultando...";

    try{

        const response =
            await fetch(
                `${API}?cuit=${cuit}`
            );

        const json =
            await response.json();

        if(!json.ok){

            resultado.innerHTML =
                `<p class="error">${json.error}</p>`;

            return;
        }

        const data = json.data.results;

        let html = "";

        html += `
        <div class="card">
            <h2>${data.denominacion}</h2>
            <p><strong>CUIT:</strong> ${data.identificacion}</p>
        </div>
        `;

        data.periodos.forEach(periodo => {

            html += `
            <div class="card">
                <h3>Periodo ${periodo.periodo}</h3>
            `;

            periodo.entidades.forEach(entidad => {

                html += `
                <div class="entidad">
                    <strong>${entidad.entidad}</strong><br>

                    Situación:
                    ${entidad.situacion}<br>

                    Monto:
                    $${entidad.monto.toLocaleString("es-AR")}<br>

                    Días atraso:
                    ${entidad.diasAtrasoPago}
                </div>
                `;

            });

            html += "</div>";

        });

        resultado.innerHTML = html;

    }
    catch(err){

        resultado.innerHTML =
            `<p class="error">${err}</p>`;

    }

}

</script>

</body>
</html>
