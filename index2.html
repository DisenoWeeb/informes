

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{max-width:420px;margin:0 auto;padding:1.5rem 1rem 3rem}
.logo-area{text-align:center;margin-bottom:2rem}
.logo-area h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.logo-area p{font-size:13px;color:var(--color-text-secondary);margin-top:4px}
.search-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.input-wrap{display:flex;gap:8px;align-items:center}
.input-wrap input{flex:1;font-size:15px;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.input-wrap input:focus{border-color:var(--color-border-primary)}
.btn-consultar{background:#1a56db;color:#fff;border:none;border-radius:var(--border-radius-md);padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-consultar:active{transform:scale(0.97)}
.progress-wrap{margin-top:1rem;display:none}
.progress-bar-bg{height:4px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;width:0%;background:#1a56db;transition:width 0.4s ease;border-radius:4px}
.progress-label{font-size:12px;color:var(--color-text-secondary);margin-top:6px}

.resultado{margin-top:1.5rem}
.seccion{margin-bottom:1rem}
.header-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;gap:12px}
.avatar{width:48px;height:48px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:#185fa5;flex-shrink:0}
.header-info h2{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.header-info p{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

.score-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.score-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.score-box .val{font-size:22px;font-weight:500}
.score-box .lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

.sec-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.deuda-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:8px}
.deuda-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.deuda-entidad{font-size:14px;font-weight:500;color:var(--color-text-primary);line-height:1.3;flex:1;margin-right:8px}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.sit1{background:#eaf3de;color:#3b6d11}
.sit2{background:#faeeda;color:#854f0b}
.sit3{background:#faeeda;color:#633806}
.sit4{background:#fcebeb;color:#a32d2d}
.sit5{background:#fcebeb;color:#501313}
.sit6{background:#2c2c2a;color:#d3d1c7}
.deuda-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.deuda-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.deuda-stat .ds-val{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.deuda-stat .ds-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:1px}

.hist-scroll{overflow-x:auto;margin-bottom:1rem;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary)}
.hist-table{border-collapse:collapse;font-size:12px;width:100%;min-width:500px}
.hist-table th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.hist-table td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tbody tr:hover{background:var(--color-background-secondary)}
.sit-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

.cta-section{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1.5rem}
.btn-cta{border-radius:var(--border-radius-lg);padding:14px 10px;font-size:13px;font-weight:500;cursor:pointer;text-align:center;border:0.5px solid var(--color-border-secondary);line-height:1.4}
.btn-cta i{display:block;font-size:22px;margin-bottom:6px;color:var(--color-text-secondary)}
.btn-primary-cta{background:#1a56db;color:#fff;border-color:#1a56db}
.btn-primary-cta i{color:rgba(255,255,255,0.8)}
.btn-secondary-cta{background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-cta:active{transform:scale(0.97)}
.error-box{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;text-align:center;color:var(--color-text-danger)}

.sin-deuda{text-align:center;padding:1.5rem;color:var(--color-text-secondary);font-size:14px}
</style>

<div class="wrap">
  <div class="logo-area">
    <h1><i class="ti ti-shield-check" aria-hidden="true" style="color:#1a56db;margin-right:6px;font-size:20px"></i>Riesgo Crediticio</h1>
    <p>Consulta tu situación en el Banco Central</p>
  </div>

  <div class="search-card">
    <div class="input-wrap">
      <input id="cuit" type="tel" placeholder="Ingresá tu CUIT sin guiones" inputmode="numeric" />
      <button class="btn-consultar" onclick="consultar()">Consultar</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Iniciando consulta...</div>
    </div>
  </div>

  <div class="resultado" id="resultado"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycby29NcU3FPBzkdv3l9Cz_eNBgpmLnTNmnOtkqROAxxt4QXi3YzH77AQCXqMXY7pAba-1Q/exec";

const SITUACIONES = {
  1:{label:"Al día",color:"sit1",dot:"#639922"},
  2:{label:"Atraso leve",color:"sit2",dot:"#ef9f27"},
  3:{label:"Atraso moderado",color:"sit3",dot:"#BA7517"},
  4:{label:"Alto riesgo",color:"sit4",dot:"#E24B4A"},
  5:{label:"Irrecuperable",color:"sit5",dot:"#A32D2D"},
  6:{label:"Irrecup. (banco)",color:"sit6",dot:"#888780"}
};

function sitInfo(n){return SITUACIONES[n]||{label:"Situación "+n,color:"sit6",dot:"#888780"}}

function fmt(n){
  const v = n * 1000;
  return "$" + v.toLocaleString("es-AR",{maximumFractionDigits:0});
}

function fmtDias(d){
  if(!d||d===0) return "Sin atraso";
  return d + " días";
}

function iniciales(nombre){
  if(!nombre) return "?";
  const parts = nombre.trim().split(" ");
  if(parts.length>=2) return (parts[0][0]+(parts[1][0])).toUpperCase();
  return nombre.substring(0,2).toUpperCase();
}

let progTimer = null;
function startProgress(){
  const wrap = document.getElementById("progress-wrap");
  const fill = document.getElementById("progress-fill");
  const lbl = document.getElementById("progress-label");
  wrap.style.display="block";
  const steps = [
    {p:15,t:"Conectando con el Banco Central..."},
    {p:40,t:"Consultando deudas actuales..."},
    {p:65,t:"Consultando historial 24 meses..."},
    {p:85,t:"Procesando información..."},
  ];
  let i=0;
  fill.style.width="5%";
  lbl.textContent=steps[0].t;
  progTimer = setInterval(()=>{
    if(i<steps.length){
      fill.style.width=steps[i].p+"%";
      lbl.textContent=steps[i].t;
      i++;
    }
  },900);
}
function endProgress(){
  clearInterval(progTimer);
  document.getElementById("progress-fill").style.width="100%";
  document.getElementById("progress-label").textContent="¡Listo!";
  setTimeout(()=>{document.getElementById("progress-wrap").style.display="none"},600);
}

function consultar(){
  const cuit = document.getElementById("cuit").value.trim().replace(/\D/g,"");
  const resultado = document.getElementById("resultado");
  resultado.innerHTML="";
  if(!cuit){resultado.innerHTML='<div class="error-box"><i class="ti ti-alert-circle" style="font-size:24px;display:block;margin-bottom:6px"></i>Ingresá tu CUIT para continuar.</div>';return;}
  startProgress();

  const viejo = document.getElementById("script-bcra");
  if(viejo) viejo.remove();
  const cbName = "bcraCallback_"+Date.now();
  window[cbName] = function(json){
    delete window[cbName];
    document.getElementById("script-bcra")?.remove();
    endProgress();
    if(!json.ok){resultado.innerHTML=`<div class="error-box"><i class="ti ti-alert-circle" style="font-size:24px;display:block;margin-bottom:6px"></i>${json.error}</div>`;return;}
    renderizar(json);
  };
  const s=document.createElement("script");
  s.id="script-bcra";
  s.src=`${API}?cuit=${cuit}&callback=${cbName}`;
  s.onerror=()=>{endProgress();resultado.innerHTML='<div class="error-box">Error al conectar con el servidor.</div>';};
  document.body.appendChild(s);
}

function renderizar(json){
  const resultado = document.getElementById("resultado");
  const d = json.actual.results;
  const h = json.historica.results;

  const peorSit = d.periodos?.flatMap(p=>p.entidades).reduce((m,e)=>Math.max(m,e.situacion),1)||1;
  const peorInfo = sitInfo(peorSit);
  const totalDeuda = d.periodos?.flatMap(p=>p.entidades).reduce((s,e)=>s+e.monto,0)||0;
  const cantEntidades = d.periodos?.flatMap(p=>p.entidades).length||0;

  let html = "";

  html += `<div class="seccion">
    <div class="header-card">
      <div class="avatar">${iniciales(d.denominacion)}</div>
      <div class="header-info">
        <h2>${d.denominacion}</h2>
        <p>CUIT ${d.identificacion}</p>
      </div>
    </div>
  </div>`;

  html += `<div class="score-strip">
    <div class="score-box">
      <div class="val" style="color:${peorInfo.dot}">${peorSit}</div>
      <div class="lbl">Situación máxima</div>
      <div style="font-size:11px;font-weight:500;color:${peorInfo.dot};margin-top:2px">${peorInfo.label}</div>
    </div>
    <div class="score-box">
      <div class="val">${fmt(totalDeuda)}</div>
      <div class="lbl">Deuda total</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${cantEntidades} entidad${cantEntidades!==1?"es":""}</div>
    </div>
  </div>`;

  html += `<div class="sec-title"><i class="ti ti-building-bank" aria-hidden="true"></i>Deuda actual</div>`;

  if(d.periodos && d.periodos.length>0){
    d.periodos.forEach(periodo=>{
      periodo.entidades.forEach(ent=>{
        const si = sitInfo(ent.situacion);
        html += `<div class="deuda-card">
          <div class="deuda-top">
            <div class="deuda-entidad">${ent.entidad}</div>
            <span class="badge ${si.color}">Sit. ${ent.situacion} — ${si.label}</span>
          </div>
          <div class="deuda-grid">
            <div class="deuda-stat">
              <div class="ds-val">${fmt(ent.monto)}</div>
              <div class="ds-lbl">Monto adeudado</div>
            </div>
            <div class="deuda-stat">
              <div class="ds-val" style="color:${ent.diasAtrasoPago>0?'#E24B4A':'#639922'}">${fmtDias(ent.diasAtrasoPago)}</div>
              <div class="ds-lbl">Días de atraso</div>
            </div>
          </div>
        </div>`;
      });
    });
  } else {
    html += `<div class="deuda-card"><div class="sin-deuda"><i class="ti ti-circle-check" style="font-size:28px;color:#639922;display:block;margin-bottom:8px"></i>Sin deudas activas registradas</div></div>`;
  }

  html += `<div class="sec-title" style="margin-top:1rem"><i class="ti ti-history" aria-hidden="true"></i>Historial 24 meses</div>`;

  if(h.periodos && h.periodos.length>0){
    const filas = [];
    h.periodos.forEach(p=>{
      p.entidades.forEach(e=>{
        filas.push({periodo:p.periodo,entidad:e.entidad,situacion:e.situacion,monto:e.monto});
      });
    });
    filas.sort((a,b)=>a.entidad.localeCompare(b.entidad)||String(b.periodo).localeCompare(String(a.periodo)));

    html += `<div class="hist-scroll"><table class="hist-table">
      <thead><tr><th>Entidad</th><th>Período</th><th>Situación</th><th>Monto</th></tr></thead>
      <tbody>`;
    filas.forEach(f=>{
      const si=sitInfo(f.situacion);
      html+=`<tr>
        <td style="font-weight:500">${f.entidad}</td>
        <td>${String(f.periodo).replace(/(\d{4})(\d{2})/,"$1/$2")}</td>
        <td><span class="sit-dot" style="background:${si.dot}"></span>${f.situacion} — ${si.label}</td>
        <td>${fmt(f.monto)}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  } else {
    html+=`<div class="deuda-card"><div class="sin-deuda">Sin historial disponible.</div></div>`;
  }

  html+=`<div class="cta-section">
    <button class="btn-cta btn-primary-cta"><i class="ti ti-user-check" aria-hidden="true"></i>Comenzar</button>
    <button class="btn-cta btn-secondary-cta"><i class="ti ti-robot" aria-hidden="true"></i>Autogestión IA</button>
  </div>`;

  resultado.innerHTML=html;
}

document.getElementById("cuit").addEventListener("keydown",e=>{if(e.key==="Enter")consultar();});
</script>
